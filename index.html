<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="A local-first flashcard and quiz revision app for the COMP90054 reinforcement learning course notes. Your cards live on your device."
    />
    <title>Actual Intelligence — RL revision</title>
    <script>
      // Set the theme before first paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var stored = localStorage.getItem('ai.theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
